version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/rust-core"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "rust"
    groups:
      rust-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "typescript"
    groups:
      npm-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-deps:
        patterns:
          - "*"
