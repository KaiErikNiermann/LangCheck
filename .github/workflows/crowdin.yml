name: Crowdin

on:
  push:
    branches: [main]
    paths:
      - "extension/l10n/bundle.l10n.json"
      - "extension/package.nls.json"
      - "docs/**/*.md"
      - "docs/**/*.rst"
      - "crowdin.yml"
      - ".github/workflows/crowdin.yml"
  schedule:
    - cron: "0 4 * * 1" # Download translations every Monday 04:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "download"
        type: choice
        options:
          - upload
          - download

permissions:
  contents: write
  pull-requests: write

jobs:
  upload-sources:
    name: Upload sources to Crowdin
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'upload')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build Sphinx gettext catalogs
        run: |
          pip install -r docs/requirements.txt
          sphinx-build -b gettext docs docs/_build/gettext

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  download-translations:
    name: Download translations
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'download')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "i18n: new Crowdin translations"
          pull_request_body: >-
            Automated PR with new and updated translations from
            [Crowdin](https://crowdin.com).
          pull_request_base_branch_name: main
          pull_request_labels: "l10n, automated"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
