name: Lint TypeScript

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "proto/**"
      - ".github/workflows/lint-ts.yml"
  pull_request:
    branches: [main]
    paths:
      - "extension/**"
      - "proto/**"
      - ".github/workflows/lint-ts.yml"

concurrency:
  group: lint-ts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extension/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: ESLint
        run: pnpm run lint

  proto-check:
    name: Proto Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extension/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      - name: Regenerate proto bindings
        working-directory: extension
        run: pnpm run proto:gen

      - name: Check for uncommitted proto changes
        run: git diff --exit-code extension/src/proto/
