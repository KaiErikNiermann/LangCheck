name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build HTML (English)
        working-directory: docs
        run: sphinx-build -b html . _build/html

      # ── Multi-language builds ──────────────────────────────────
      # When a language is added to supported_languages in conf.py,
      # uncomment its block below to build translated docs into
      # _build/html/{lang}/.
      #
      # - name: Build HTML (French)
      #   working-directory: docs
      #   run: sphinx-build -b html -D language=fr . _build/html/fr
      #
      # - name: Build HTML (Spanish)
      #   working-directory: docs
      #   run: sphinx-build -b html -D language=es . _build/html/es
      #
      # - name: Build HTML (Japanese)
      #   working-directory: docs
      #   run: sphinx-build -b html -D language=ja . _build/html/ja

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
