name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Reusable retry shell function — source this in steps that download from
# external services (GitHub Releases, pip, etc.) to survive transient 500s.
# Uses exponential backoff: 5s → 15s → 45s → 90s (4 attempts by default).
env:
  RETRY_FN: |
    retry() {
      local max_attempts="${RETRY_MAX:-4}"
      local delay=5
      local attempt=1
      while true; do
        if "$@"; then return 0; fi
        if [ "$attempt" -ge "$max_attempts" ]; then
          echo "::error::Command failed after $attempt attempts: $*"
          return 1
        fi
        echo "::warning::Attempt $attempt/$max_attempts failed, retrying in ${delay}s..."
        sleep "$delay"
        delay=$((delay * 3))
        attempt=$((attempt + 1))
      done
    }

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: language-check
            server_binary: language-check-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: language-check
            server_binary: language-check-server
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: language-check
            server_binary: language-check-server
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: language-check
            server_binary: language-check-server
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: language-check.exe
            server_binary: language-check-server.exe
    defaults:
      run:
        working-directory: rust-core
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        shell: bash
        working-directory: .
        run: |
          eval "$RETRY_FN"
          PROTOC_VERSION="28.3"
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   PROTOC_ASSET="protoc-${PROTOC_VERSION}-linux-x86_64.zip" ;;
            Linux-ARM64) PROTOC_ASSET="protoc-${PROTOC_VERSION}-linux-aarch_64.zip" ;;
            macOS-X64)   PROTOC_ASSET="protoc-${PROTOC_VERSION}-osx-x86_64.zip" ;;
            macOS-ARM64) PROTOC_ASSET="protoc-${PROTOC_VERSION}-osx-aarch_64.zip" ;;
            Windows-X64) PROTOC_ASSET="protoc-${PROTOC_VERSION}-win64.zip" ;;
            *) echo "::error::Unsupported platform"; exit 1 ;;
          esac
          PROTOC_URL="https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ASSET}"
          retry curl -fsSL "$PROTOC_URL" -o /tmp/protoc.zip
          if [ "${{ runner.os }}" = "Windows" ]; then
            unzip -o /tmp/protoc.zip -d "$HOME/.local"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
            echo "PROTOC=$HOME/.local/bin/protoc.exe" >> "$GITHUB_ENV"
          else
            sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          fi
          protoc --version

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Stage proto for cross build
        if: matrix.cross
        run: mkdir -p proto && cp ../proto/checker.proto proto/

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp target/${{ matrix.target }}/release/${{ matrix.server_binary }} dist/
          cd dist
          tar czf ../language-check-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: rust-core/language-check-${{ matrix.target }}.tar.gz

  smoke-test:
    name: Smoke Test (${{ matrix.target }})
    needs: [build-binaries, build-wasm-plugins]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: language-check
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: language-check
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: language-check.exe
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.target }}
          path: artifact

      - name: Download WASM plugins
        uses: actions/download-artifact@v8
        with:
          name: wasm-plugins
          path: wasm-plugins

      - name: Extract binary
        shell: bash
        run: |
          mkdir -p bin
          tar xzf artifact/language-check-${{ matrix.target }}.tar.gz -C bin
          chmod +x bin/${{ matrix.binary }}

      - name: Install Vale
        shell: bash
        run: |
          eval "$RETRY_FN"
          case "${{ runner.os }}" in
            Linux)
              retry curl -fsSL https://github.com/errata-ai/vale/releases/latest/download/vale_Linux_64-bit.tar.gz -o /tmp/vale.tar.gz
              sudo tar xzf /tmp/vale.tar.gz -C /usr/local/bin vale
              ;;
            macOS)
              retry brew install vale
              ;;
            Windows)
              retry choco install vale -y
              ;;
          esac
          vale --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Proselint
        shell: bash
        run: |
          eval "$RETRY_FN"
          retry pip install proselint
          proselint --version

      - name: Extract expected version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        shell: bash
        run: .github/smoke-test.sh bin/${{ matrix.binary }} "${{ steps.version.outputs.version }}" wasm-plugins/wordiness-check.wasm

  build-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build-binaries
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extension/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage native binaries
        run: |
          mkdir -p native
          for archive in ../artifacts/binary-*/language-check-*.tar.gz; do
            target=$(basename "$archive" .tar.gz | sed 's/language-check-//')
            mkdir -p "native/$target"
            tar xzf "$archive" -C "native/$target"
          done

      - name: Build webview assets
        run: |
          cd webview
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build extension
        run: pnpm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: extension/*.vsix

  nvim-smoke-test:
    name: Neovim LSP Smoke Test
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        run: |
          eval "$RETRY_FN"
          retry curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-x86_64-unknown-linux-gnu
          path: artifact

      - name: Extract server binary
        run: |
          mkdir -p bin
          tar xzf artifact/language-check-x86_64-unknown-linux-gnu.tar.gz -C bin
          chmod +x bin/language-check-server

      - name: Run Neovim LSP smoke tests
        run: .github/nvim-lsp-smoke-test.sh bin/language-check-server

  build-wasm-plugins:
    name: Build WASM Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install TinyGo
        run: |
          eval "$RETRY_FN"
          retry wget -q https://github.com/tinygo-org/tinygo/releases/download/v0.34.0/tinygo_0.34.0_amd64.deb -O /tmp/tinygo.deb
          sudo dpkg -i /tmp/tinygo.deb

      - name: Build wordiness-check plugin
        working-directory: plugins/wordiness-check
        run: make build

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-plugins
          path: plugins/wordiness-check/wordiness-check.wasm

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-vsix, smoke-test, nvim-smoke-test, build-wasm-plugins]
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/binary-*/language-check-*.tar.gz
            artifacts/vsix/*.vsix
            artifacts/wasm-plugins/*.wasm

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    defaults:
      run:
        working-directory: rust-core
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        shell: bash
        working-directory: .
        run: |
          eval "$RETRY_FN"
          PROTOC_VERSION="28.3"
          retry curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - uses: dtolnay/rust-toolchain@stable

      - name: Copy proto into crate
        run: mkdir -p proto && cp ../proto/checker.proto proto/

      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-vsix:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix
          path: vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX (optional)
        if: env.OVSX_PAT != ''
        run: npx ovsx publish vsix/*.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 checksums
        id: sha
        run: |
          sha_linux_amd64=$(sha256sum artifacts/binary-x86_64-unknown-linux-gnu/language-check-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          sha_linux_arm64=$(sha256sum artifacts/binary-aarch64-unknown-linux-gnu/language-check-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          sha_macos_amd64=$(sha256sum artifacts/binary-x86_64-apple-darwin/language-check-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          sha_macos_arm64=$(sha256sum artifacts/binary-aarch64-apple-darwin/language-check-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          echo "linux_amd64=$sha_linux_amd64" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$sha_linux_arm64" >> "$GITHUB_OUTPUT"
          echo "macos_amd64=$sha_macos_amd64" >> "$GITHUB_OUTPUT"
          echo "macos_arm64=$sha_macos_arm64" >> "$GITHUB_OUTPUT"

      - name: Render formula
        run: |
          sed \
            -e 's/@@VERSION@@/${{ steps.version.outputs.version }}/g' \
            -e 's/@@SHA256_LINUX_AMD64@@/${{ steps.sha.outputs.linux_amd64 }}/g' \
            -e 's/@@SHA256_LINUX_ARM64@@/${{ steps.sha.outputs.linux_arm64 }}/g' \
            -e 's/@@SHA256_MACOS_AMD64@@/${{ steps.sha.outputs.macos_amd64 }}/g' \
            -e 's/@@SHA256_MACOS_ARM64@@/${{ steps.sha.outputs.macos_arm64 }}/g' \
            .github/homebrew-formula.rb > lang-check.rb

      - name: Push formula to tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/KaiErikNiermann/homebrew-lang-check.git tap
          cd tap
          mkdir -p Formula
          cp ../lang-check.rb Formula/lang-check.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lang-check.rb
          git commit -m "lang-check ${{ steps.version.outputs.version }}"
          git push
