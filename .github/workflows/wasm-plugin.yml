name: WASM Plugins

on:
  push:
    paths:
      - "plugins/**"
      - "rust-core/tests/wasm_plugin.rs"
  pull_request:
    paths:
      - "plugins/**"
      - "rust-core/tests/wasm_plugin.rs"

jobs:
  build-and-test:
    name: Build & Test WASM Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install TinyGo
        run: |
          wget -q https://github.com/nicholasgasior/tinygo-build/releases/latest/download/tinygo_amd64.deb -O /tmp/tinygo.deb \
            || wget -q https://github.com/tinygo-org/tinygo/releases/download/v0.34.0/tinygo_0.34.0_amd64.deb -O /tmp/tinygo.deb
          sudo dpkg -i /tmp/tinygo.deb

      - name: Run Go tests
        working-directory: plugins/wordiness-check
        run: go test -v ./...

      - name: Build WASM plugin
        working-directory: plugins/wordiness-check
        run: make build

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust integration tests
        working-directory: rust-core
        run: cargo test --test wasm_plugin
