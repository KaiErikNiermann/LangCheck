services:
  languagetool:
    image: erikvl87/languagetool
    ports:
      - "8010:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8010/v2/languages || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Optional: mount ngrams if the user provides them
    # volumes:
    #   - ./ngrams:/ngrams
