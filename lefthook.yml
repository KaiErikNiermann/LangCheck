---
# Lefthook configuration for lang-check project
# Runs checks before pushing to ensure code quality

pre-push:
  parallel: true
  commands:
    rust_fmt:
      root: rust-core/
      glob: "*.rs"
      run: cargo fmt --check

    rust_clippy:
      root: rust-core/
      glob: "*.rs"
      run: cargo clippy -- -D warnings

    rust_test:
      root: rust-core/
      glob: "*.rs"
      run: cargo test

    ts_type_check:
      root: extension/
      glob: "**/*.{ts,tsx}"
      run: npx tsc --noEmit

    ts_lint:
      root: extension/
      glob: "**/*.{ts,tsx}"
      run: pnpm run lint
