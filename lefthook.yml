---
# Lefthook configuration for lang-check project
# Runs checks before pushing to ensure code quality

pre-push:
  parallel: true
  commands:
    tool_versions:
      priority: 1
      run: ./scripts/check-tool-versions.sh

    rust_fmt:
      root: rust-core/
      glob: "*.rs"
      run: cargo fmt --check

    rust_clippy:
      root: rust-core/
      glob: "*.rs"
      run: cargo clippy -- -D warnings

    rust_test:
      root: rust-core/
      glob: "*.rs"
      run: cargo test

    ts_type_check:
      root: extension/
      glob: "**/*.{ts,tsx}"
      run: npx tsc --noEmit

    ts_lint:
      root: extension/
      glob: "**/*.{ts,tsx}"
      run: pnpm run lint

    lua_fmt:
      glob: "**/*.lua"
      run: |
        if command -v stylua >/dev/null 2>&1; then
          stylua --check editors/nvim/ .github/nvim-lsp-test.lua
        else
          echo "⚠ stylua not found, skipping Lua format check (install: cargo install stylua)"
        fi

    lua_lint:
      glob: "**/*.lua"
      run: |
        if command -v luacheck >/dev/null 2>&1; then
          luacheck editors/nvim/ .github/nvim-lsp-test.lua
        else
          echo "⚠ luacheck not found, skipping Lua lint (install: luarocks install luacheck)"
        fi
