syntax = "proto3";

package languagecheck;

message Request {
  uint64 id = 1;
  oneof payload {
    CheckRequest check_prose = 2;
    MetadataRequest get_metadata = 3;
    IgnoreRequest ignore = 4;
    InitializeRequest initialize = 5;
    AddDictionaryWordRequest add_dictionary_word = 6;
  }
}

message InitializeRequest {
  string workspace_root = 1;
}

message IgnoreRequest {
  string message = 1;
  string context = 2;
  string text = 3;
  uint32 start_byte = 4;
  uint32 end_byte = 5;
}

message Response {
  uint64 id = 1;
  oneof payload {
    CheckResponse check_prose = 2;
    MetadataResponse get_metadata = 3;
    ErrorResponse error = 4;
    OkResponse ok = 5;
  }
}

message OkResponse {}

message ErrorResponse {
  string message = 1;
}

service CheckerProvider {
  // Main check request
  rpc CheckProse(CheckRequest) returns (CheckResponse);
  // Get available rules/settings for this provider
  rpc GetMetadata(MetadataRequest) returns (MetadataResponse);
}

message CheckRequest {
  string text = 1;
  string language_id = 2;
  map<string, string> settings = 3;
  optional string file_path = 4;
}

message CheckResponse {
  repeated Diagnostic diagnostics = 1;
  ExtractionInfo extraction = 2;
}

message ExtractionExclusion {
  uint32 start_byte = 1;
  uint32 end_byte = 2;
}

message ExtractionProseRange {
  uint32 start_byte = 1;
  uint32 end_byte = 2;
  repeated ExtractionExclusion exclusions = 3;
}

message ExtractionInfo {
  repeated ExtractionProseRange prose_ranges = 1;
}

message Diagnostic {
  uint32 start_byte = 1;
  uint32 end_byte = 2;
  string message = 3;
  repeated string suggestions = 4;
  string rule_id = 5;
  Severity severity = 6;
  string unified_id = 7;
  float confidence = 8;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFORMATION = 1;
  SEVERITY_WARNING = 2;
  SEVERITY_ERROR = 3;
  SEVERITY_HINT = 4;
}

message AddDictionaryWordRequest {
  string word = 1;
}

message MetadataRequest {}

message MetadataResponse {
  string name = 1;
  string version = 2;
  repeated string supported_languages = 3;
}
