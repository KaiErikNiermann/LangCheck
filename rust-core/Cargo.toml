[package]
name = "rust-core"
version = "0.1.0"
edition = "2024"

[dependencies]
prost = "0.13"
tokio = { version = "1", features = ["full"] }
ropey = "1.6"
tree-sitter = "0.19.5"
tree-sitter-markdown = "0.7.1"
anyhow = "1.0"
bytes = "1.0"
harper-core = { version = "1.8.0", features = ["concurrent"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"

[build-dependencies]
prost-build = "0.13"
