[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
    # bincode unmaintained — transitive via burn-core (harper dep), no upgrade path
    "RUSTSEC-2025-0141",
    # fxhash unmaintained — transitive via wasmtime (extism dep), no upgrade path
    "RUSTSEC-2025-0057",
    # paste unmaintained — transitive via harper-core + burn-ndarray, no upgrade path
    "RUSTSEC-2024-0436",
    # wasmtime vulns — extism 1.13.0 pins wasmtime 37.0.3, awaiting upstream update
    "RUSTSEC-2026-0006",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
